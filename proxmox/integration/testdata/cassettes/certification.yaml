---
# mockpve certification record (DESIGN-0002 OQ-8 = b): one entry per recording
# batch. An entry means "mockpve's envelope matches what PVE <pve_version>
# actually returned for the recorded surface" — divergences found while
# comparing mockpve to fresh cassettes are fixed in mockpve (or documented in
# notes) before the entry lands. The committed cassettes replay in CI
# (`just test-replay`), so each batch is regression-guarded, not
# once-observed.
- pve_version: 9.2-1
  recorded: 2026-07-06 # live run on the r740a lab node
  commit: c36b7da # commit that introduced the batch
  harness: branch # pre-v0.2.0 buildout (pvelab did not exist yet)
  cassettes:
    - TestVersionRoundTrip
    - TestComputeReads
    - TestStorageReads
    - TestClusterAndHAReads
    - TestNetworkReads
    - TestAccessReads
    - TestQEMULifecycle
    - TestLXCLifecycle
    - TestISOUpload
    - TestConsoleMint
  notes: >-
    Batch predates the dogfood lab; recorded directly against r740a.
    Divergences reconciled into the SDK/mock from this run and the later
    live spikes: transport chunked-body 501 + redundant-multipart-field 400
    (SDK upload fixes), recorder must not use replayable interactions (task
    polls), and two mockpve fidelity fixes found by the Phase 0/1 pvelab work
    — config reads serialize memory as a quoted string (9.2.4), and the
    qemu/lxc create handlers persist every create-form key like real PVE.
    TestResourceAffinityPlacement joins the batch after the first full
    dogfood run (IMPL-0002 Phase 3, live-pending).
