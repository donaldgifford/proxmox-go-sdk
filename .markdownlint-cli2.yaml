---
# markdownlint-cli2 runner options. Lint *rules* live in .markdownlint.yaml
# (this file only scopes which files are linted).
#
# .claude/ holds local tool state — e.g. the donald-loop state file — not repo
# documentation, so it must not be linted or it fails MD041 and friends.
ignores:
  - ".claude"
  - "node_modules"
