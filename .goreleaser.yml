---
# $schema=https://goreleaser.com/static/schema.json
# goreleaser config for proxmox-go-sdk.
#
# The SDK itself is a Go library — it is "released" by the git tag alone
# (consumers `go get` a pinned tag; there is no binary to ship). goreleaser here
# builds and publishes only the mockpve test-helper server (cmd/mockpve), plus
# checksums/SBOM/signatures for it.
#
# Triggered by .forgejo/workflows/release.yml or .github/workflows/release.yml on tag push.
version: 2

project_name: proxmox-go-sdk

builds:
  - id: mockpve
    main: ./cmd/mockpve
    binary: mockpve
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "mockpve_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    files:
      - none*

sboms:
  - id: archives
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]

checksum:
  name_template: 'checksums.txt'

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat:"
      order: 0
    - title: Bug Fixes
      regexp: "^fix:"
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: donaldgifford
    name: proxmox-go-sdk
  draft: false
  prerelease: auto
  mode: prepend
  header: |
    ## Release {{ .Tag }} ({{ .Date }})

    Use the SDK as a Go module:

    ```bash
    go get github.com/donaldgifford/proxmox-go-sdk/proxmox@{{ .Tag }}
    ```

    ### mockpve test-helper server (optional)

    The archives below contain only `mockpve`, the in-memory PVE responder for
    consumer integration tests:

    ```bash
    tar -xzf mockpve_*.tar.gz
    mv mockpve ~/.local/bin/
    ```

  footer: |
    ---
    **Full Changelog**: https://github.com/donaldgifford/proxmox-go-sdk/compare/{{ .PreviousTag }}...{{ .Tag }}

snapshot:
  version_template: "{{ .Tag }}-dev"
