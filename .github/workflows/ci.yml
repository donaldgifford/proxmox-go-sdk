---
# $schema=https://www.schemastore.org/github-action.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Label PR
    steps:
      - name: Run labeler
        uses: actions/labeler@v6
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up mise (for just)
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Run unit tests
        run: just test

      - name: Check API schema drift
        run: just schemadiff

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: donaldgifford/commons
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        uses: donaldgifford/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

  build:
    name: Build (goreleaser snapshot)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # syft is required by the .goreleaser.yml sboms block, which catalogs the
      # mockpve helper archives. mise installs it (per mise.toml) onto PATH.
      - name: Set up mise (for syft)
        uses: jdx/mise-action@v4
        with:
          experimental: true

      # This snapshot validates the .goreleaser.yml config end to end: it builds
      # the mockpve helper archives and SBOM-scans them with syft. Signing is
      # skipped — the signs block needs GPG_FINGERPRINT + a key, which are
      # release-only secrets absent from a PR snapshot.
      - name: Validate goreleaser config (snapshot)
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: "~> v2"
          args: release --snapshot --skip=publish,sign --clean
